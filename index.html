<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Reindirizzamento...</title>
    
    <style>
        html {
            color-scheme: light;
        }
        html.dark-mode {
            color-scheme: dark;
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f5f7fa;
        }
        html.dark-mode body { background-color: #1e1e1e; }
        html.amoled-mode body { background-color: #000000; }
    </style>

    <script>
        (function() {
            const theme = localStorage.getItem('themeMode') || (localStorage.getItem('darkMode') === 'true' ? 'dark' : 'light');
            let themeColor = '#f5f7fa';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-mode');
                themeColor = '#1e1e1e';
            } else if (theme === 'amoled') {
                document.documentElement.classList.add('dark-mode', 'amoled-mode');
                themeColor = '#000000';
            }
            
            const metaTheme = document.createElement('meta');
            metaTheme.name = 'theme-color';
            metaTheme.content = themeColor;
            document.head.appendChild(metaTheme);
        })();
    </script>

    <meta http-equiv="refresh" content="0; URL='https://guidatv-omega.vercel.app'">
</head>
<body>
</body>
</html>
